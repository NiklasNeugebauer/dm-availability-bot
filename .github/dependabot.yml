version: 2
updates:
  # Python dependencies (uv.lock / pyproject.toml)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  # Base images in the Dockerfile (python, uv)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
