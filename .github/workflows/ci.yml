name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest tests/ -q
